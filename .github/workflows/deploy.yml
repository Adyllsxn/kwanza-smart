name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' 

      - name: Publish Project
        run: dotnet publish apps/KwanzaSmart.Client/KwanzaSmart.Client.csproj -c Release -o release

      # O GitHub Pages precisa deste ficheiro para não dar erro 404 em rotas do Blazor
      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      # Truque para SPA: copia o index.html para 404.html para suportar refresh de página
      - name: Copy index.html to 404.html
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Upload to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
          branch: gh-pages
